<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 overflow-hidden">
    <div class="row h-100">
        <div class="col-lg-4 d-none d-lg-flex flex-column justify-content-center align-items-center text-white" style="background: linear-gradient(rgba(25, 135, 84, 0.85), rgba(20, 108, 67, 0.9)), url('https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?q=80&w=1000') center/cover;">
            <i class="fa-solid fa-graduation-cap display-1 mb-4"></i>
            <h1 class="fw-bold display-5 text-center px-3">Smart Academic</h1>
            <p class="fs-6 opacity-75 text-center px-4">Khởi đầu hành trình học thuật và nghiên cứu của bạn ngay hôm nay</p>
        </div>

        <div class="col-12 col-lg-8 d-flex justify-content-center align-items-center bg-light overflow-y-auto py-5">
            <div class="w-100 px-4 px-md-5" style="max-width: 700px;">
                <h2 class="fw-bold text-dark mb-1">Tạo tài khoản mới</h2>
                <p class="text-secondary mb-4">Điền thông tin của bạn để tham gia hệ thống</p>

                <form th:action="@{/register}" th:object="${userRegisterDTO}" method="post">

                    <div class="mb-3">
                        <label for="role" class="form-label small fw-bold text-secondary">Vai trò đăng ký</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-users-gear"></i></span>
                            <select id="role" class="form-select border-start-0 ps-0 fw-bold" th:field="*{role}" onchange="toggleStudentField()">
                                <option value="" selected>-- Chọn vai trò --</option>
                                <option th:value="STUDENT" th:text="'Sinh viên'"></option>
                                <option th:value="LECTURER" th:text="'Giảng viên'"></option>
                            </select>
                        </div>
                        <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6" id="fullNameWrapper">
                            <label for="fullName" class="form-label small fw-bold text-secondary">Họ và tên</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-address-card"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="fullName" placeholder="Nguyễn Văn A" th:field="*{fullName}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>

                        <div class="col-md-6" id="studentIdWrapper">
                            <label for="studentIdCode" class="form-label small fw-bold text-secondary">Mã Sinh Viên</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-id-badge"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="studentIdCode" placeholder="B24DTCN..." th:field="*{studentIdCode}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('studentIdCode')}" th:errors="*{studentIdCode}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="email" class="form-label small fw-bold text-secondary">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="email@ptit.edu.vn" th:field="*{email}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="phone" class="form-label small fw-bold text-secondary">Số điện thoại</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-phone"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="phone" placeholder="09xxxxxxxxx" th:field="*{phone}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label small fw-bold text-secondary">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Tên đăng nhập" th:field="*{username}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="password" class="form-label small fw-bold text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-secondary"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Mật khẩu" th:field="*{password}">
                            </div>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                    </div>

                    <div th:if="${errorMessage}" class="alert alert-danger py-2 small fw-bold mb-3 shadow-sm" role="alert">
                        <i class="fa-solid fa-circle-xmark me-1"></i><span th:text="${errorMessage}"></span>
                    </div>

                    <div class="mb-3" th:if="${#fields.hasErrors('global')}">
                        <div class="alert alert-danger py-2 small fw-bold mb-0 shadow-sm">
                            <ul class="mb-0 ps-3">
                                <li th:each="err : ${#fields.errors('global')}" th:text="${err}"></li>
                            </ul>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold mb-3 shadow-sm">Đăng ký tài khoản</button>
                </form>

                <div class="text-center">
                    <span class="text-muted small">Đã có tài khoản?</span>
                    <a th:href="@{/login}" class="text-success text-decoration-none fw-bold small ms-1">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleStudentField() {
        const role = document.getElementById('role').value;
        const studentWrapper = document.getElementById('studentIdWrapper');
        const nameWrapper = document.getElementById('fullNameWrapper');
        const studentInput = document.getElementById('studentIdCode');

        if (role === 'LECTURER') {
            studentWrapper.classList.add('d-none');
            nameWrapper.classList.remove('col-md-6');
            nameWrapper.classList.add('col-md-12');
            studentInput.value = '';
        } else {
            studentWrapper.classList.remove('d-none');
            nameWrapper.classList.remove('col-md-12');
            nameWrapper.classList.add('col-md-6');
        }
    }

    document.addEventListener('DOMContentLoaded', toggleStudentField);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
