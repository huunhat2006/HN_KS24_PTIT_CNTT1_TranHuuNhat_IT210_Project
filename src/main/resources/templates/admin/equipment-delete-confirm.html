<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="layout/main-layout :: main-layout(~{::content})">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Xác nhận xóa thiết bị'">Xác nhận xóa thiết bị</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-7">
            <div class="card">
                <div class="card-body p-4">
                    <h4 class="mb-3">Xác nhận xóa thiết bị</h4>
                    <div class="mb-3">Bạn có chắc chắn muốn xóa thiết bị này không?</div>
                    <div class="mb-4">
                        <div><span class="fw-semibold">Tên thiết bị:</span> <span th:text="${equipmentDTO.equipmentName}"></span></div>
                        <div><span class="fw-semibold">Loại Lab:</span> <span th:text="${equipmentDTO.labTypeName}"></span></div>
                        <div><span class="fw-semibold">Số lượng:</span> <span th:text="${equipmentDTO.totalQuantity}"></span></div>
                    </div>
                    <div class="d-flex gap-2">
                        <form th:action="@{/admin/equipment/delete/{id}(id=${equipmentDTO.id})}" method="post">
                            <button type="submit" class="btn btn-danger">Xác nhận</button>
                        </form>
                        <a th:href="@{/admin/equipment}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
