<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main-layout :: main-layout(~{::content})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Lecturer Dashboard'">Lecturer Dashboard</title>
</head>
<body>
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Dashboard Giảng Viên</h1>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-12 col-md-4">
            <div class="card stat-card" style="border-left: 4px solid #198754;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #198754;" th:text="${pendingCount}">0</div>
                    <div class="stat-label">Đang chờ</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card stat-card" style="border-left: 4px solid #0d6efd;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #0d6efd;" th:text="${completedCount}">0</div>
                    <div class="stat-label">Đã hoàn thành</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card stat-card" style="border-left: 4px solid #fd7e14;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #fd7e14;" th:text="${overdueCount}">0</div>
                    <div class="stat-label">Đã quá hạn</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-3 shadow-sm">
                <div class="card-body d-flex flex-column align-items-center">
                    <h5 class="card-title mb-4">Biểu đồ thống kê Lịch cố vấn</h5>
                    <div style="position: relative; width: 100%; max-width: 300px; margin: 0 auto;">
                        <canvas data-type="pie" th:attr="data-labels=${chartLabelsJson},data-values=${chartValuesJson}"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
