<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="main-layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Smart Academic & Lab Support Platform'">Smart Academic & Lab Support Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body th:attr="data-role=${session.loggedUser != null ? session.loggedUser.role.name() : 'ANONYMOUS'}">
<div th:insert="~{layout/header :: header}"></div>
<div class="container-wrapper">
    <div class="sidebar-wrapper">
        <div th:insert="~{layout/sidebar :: sidebar}"></div>
    </div>
    <div class="content-wrapper">
        <div class="main-content">
            <div id="main-content">
                <th:block th:replace="${content}"></th:block>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
