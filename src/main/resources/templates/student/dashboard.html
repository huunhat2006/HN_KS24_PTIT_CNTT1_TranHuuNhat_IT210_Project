<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main-layout :: main-layout(~{::content})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Student Dashboard'">Student Dashboard</title>
</head>
<body>
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Dashboard Sinh Viên</h1>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-12 col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #ffc107;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #ffc107;" th:text="${pendingSessions}">0</div>
                    <div class="stat-label">Sắp diễn ra</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #198754;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #198754;" th:text="${completedSessions}">0</div>
                    <div class="stat-label">Đã hoàn thành</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #dc3545;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #dc3545;" th:text="${canceledSessions}">0</div>
                    <div class="stat-label">Đã hủy</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #0d6efd;">
                <div class="card-body text-center">
                    <div class="stat-number" style="color: #0d6efd;" th:text="${totalSessions}">0</div>
                    <div class="stat-label">Tổng số lịch</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-3 shadow-sm">
                <div class="card-body d-flex flex-column align-items-center">
                    <h5 class="card-title mb-4">Cơ cấu Lịch cố vấn học tập</h5>
                    <div style="position: relative; width: 100%; max-width: 300px; margin: 0 auto;">
                        <canvas data-type="pie" th:attr="data-labels=${chartLabelsJson},data-values=${chartValuesJson}"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
