<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="layout/main-layout :: main-layout(~{::content})">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Đặt lịch tư vấn'">Đặt lịch tư vấn</title>
</head>
<body>
<th:block th:fragment="content">
    <div th:if="${successMessage}" class="alert alert-success mb-4" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Đặt lịch Tư vấn</h1>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/student/book-session}" th:object="${bookSessionDTO}" method="post" data-ajax="true">
                <input type="hidden" th:field="*{studentId}">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="departmentId" class="form-label">Khoa</label>
                        <select id="departmentId" name="departmentId" class="form-select" th:field="*{departmentId}">
                            <option value="">Tất cả khoa</option>
                            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.departmentName}"></option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="lecturerId" class="form-label">Giảng viên *</label>
                        <select id="lecturerId" class="form-select" th:field="*{lecturerId}" required>
                            <option value="">Chọn giảng viên</option>
                            <option th:each="lecturer : ${lecturers}"
                                    th:value="${lecturer.userId}"
                                    th:text="|${lecturer.fullName} - ${lecturer.departmentName}|"
                                    th:attr="data-dept=${lecturer.departmentId}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="sessionDate" class="form-label">Ngày *</label>
                        <input id="sessionDate" type="date" class="form-control" th:field="*{sessionDate}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="startTime" class="form-label">Giờ bắt đầu *</label>
                        <input id="startTime" type="time" class="form-control" th:field="*{startTime}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="endTime" class="form-label">Giờ kết thúc *</label>
                        <input id="endTime" type="time" class="form-control" th:field="*{endTime}" required>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Đặt lịch</button>
                    <button type="reset" class="btn btn-outline-secondary">Làm mới</button>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
